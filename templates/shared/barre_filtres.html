{% comment %}
Usage: {% include "shared/barre_filtres.html" with specialites=specialites show_statut=True statut_choices=choices %}
{% endcomment %}
<form method="get" class="barre-filtres" style="margin-bottom:14px;">
  <div class="champ-filtre" style="flex:2;min-width:160px;">
    <label><i class="fas fa-search"></i> Recherche</label>
    <input type="text" name="q" value="{{ f.q }}" placeholder="Nom, prénom...">
  </div>
  <div class="champ-filtre">
    <label>Année académique</label>
    <input type="text" name="annee" value="{{ f.annee }}" placeholder="2024-2025" style="width:120px;">
  </div>
  {% if specialites %}
  <div class="champ-filtre">
    <label>Spécialité</label>
    <select name="specialite">
      <option value="">Toutes</option>
      {% for s in specialites %}<option value="{{ s.code }}" {% if f.specialite == s.code %}selected{% endif %}>{{ s.code }}</option>{% endfor %}
    </select>
  </div>
  {% endif %}
  {% if show_statut %}
  <div class="champ-filtre">
    <label>Statut</label>
    <select name="statut">
      <option value="en_attente" {% if f.statut == 'en_attente' %}selected{% endif %}>En attente</option>
      <option value="valide"     {% if f.statut == 'valide' %}selected{% endif %}>Validé</option>
      <option value="rejete"     {% if f.statut == 'rejete' %}selected{% endif %}>Rejeté</option>
      <option value="tous"       {% if f.statut == 'tous' %}selected{% endif %}>Tous</option>
    </select>
  </div>
  {% endif %}
  {% if show_statut_dossier %}
  <div class="champ-filtre">
    <label>Statut</label>
    <select name="statut">
      <option value="en_instruction" {% if f.statut == 'en_instruction' %}selected{% endif %}>En instruction</option>
      {% for val,lib in statuts %}<option value="{{ val }}" {% if f.statut == val %}selected{% endif %}>{{ lib }}</option>{% endfor %}
      <option value="tous" {% if f.statut == 'tous' %}selected{% endif %}>Tous</option>
    </select>
  </div>
  {% endif %}
  <div style="display:flex;gap:6px;align-items:flex-end;padding-bottom:1px;">
    <button type="submit" class="btn btn-primary btn-sm"><i class="fas fa-filter"></i> Filtrer</button>
    <a href="?" class="btn btn-gris btn-sm"><i class="fas fa-xmark"></i></a>
  </div>
</form>
