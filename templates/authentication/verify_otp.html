<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vérification 2FA — ESCEP Niger</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/escep.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{% static 'images/logo_escep.png' %}" alt="ESCEP Niger">
    </div>

    <div style="text-align:center;margin-bottom:20px;">
      <div style="width:60px;height:60px;background:#e8f0ff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
        <i class="fas fa-envelope-open-text" style="font-size:1.5rem;color:#1A4F8A;"></i>
      </div>
      <h2 class="auth-title">Vérification en 2 étapes</h2>
      <p class="auth-subtitle">Entrez le code à 6 chiffres envoyé à votre adresse email.<br>Valide pendant <strong>10 minutes</strong>.</p>
    </div>

    {% for message in messages %}
    <div class="alert-escep {{ message.tags }}" style="margin-bottom:14px;">
      <i class="fas fa-info-circle"></i> {{ message }}
    </div>
    {% endfor %}

    <form method="post" action="{% url 'auth:verify_otp' %}">
      {% csrf_token %}
      <div style="margin-bottom:22px;">
        <label style="text-align:center;display:block;margin-bottom:10px;">Code de vérification</label>
        <input type="text" name="code" class="form-control otp-input" maxlength="6" minlength="6"
               inputmode="numeric" autocomplete="one-time-code"
               placeholder="000000" required autofocus
               style="text-align:center;font-size:2.2rem;font-weight:800;letter-spacing:0.8rem;color:#1A4F8A;">
      </div>
      <button type="submit" class="btn-escep btn-escep-primary" style="width:100%;justify-content:center;padding:12px;">
        <i class="fas fa-check-circle"></i> Valider le code
      </button>
    </form>

    <p style="text-align:center;margin-top:16px;font-size:0.82rem;">
      <a href="{% url 'auth:login' %}" style="color:#1A4F8A;">
        <i class="fas fa-arrow-left"></i> Retour à la connexion
      </a>
    </p>

    <div id="timer" style="text-align:center;margin-top:10px;font-size:0.8rem;color:#888;">
      Expire dans <span id="countdown" style="font-weight:700;color:#1A4F8A;">10:00</span>
    </div>
  </div>
</div>
<script>
let seconds = 600;
const el = document.getElementById('countdown');
const interval = setInterval(() => {
  seconds--;
  const m = Math.floor(seconds/60).toString().padStart(2,'0');
  const s = (seconds%60).toString().padStart(2,'0');
  el.textContent = m+':'+s;
  if (seconds <= 60) el.style.color = '#dc3545';
  if (seconds <= 0) { clearInterval(interval); el.textContent = 'Expiré'; }
}, 1000);
</script>
</body>
</html>
