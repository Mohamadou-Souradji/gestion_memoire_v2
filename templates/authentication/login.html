<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — ESCEP Niger</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/escep.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{% static 'images/logo_escep.png' %}" alt="ESCEP Niger">
      <div class="school-name">École Supérieure des Communications Électroniques et de la Poste</div>
    </div>

    <h2 class="auth-title">Connexion à la plateforme</h2>
    <p class="auth-subtitle">Saisissez vos identifiants institutionnels</p>

    {% for message in messages %}
    <div class="alert-escep {{ message.tags }}" style="margin-bottom:14px;">
      <i class="fas fa-exclamation-circle"></i> {{ message }}
    </div>
    {% endfor %}

    <form method="post" action="{% url 'auth:login' %}">
      {% csrf_token %}
      <div style="margin-bottom:16px;">
        <label for="id_identifier"><i class="fas fa-user" style="color:#1A4F8A;margin-right:6px;"></i> Nom d'utilisateur ou Email</label>
        <input type="text" name="identifier" id="id_identifier" class="form-control" placeholder="username ou email@escep.ne" required autofocus>
      </div>
      <div style="margin-bottom:22px;">
        <label for="id_password"><i class="fas fa-lock" style="color:#1A4F8A;margin-right:6px;"></i> Mot de passe</label>
        <div style="position:relative;">
          <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" required>
          <button type="button" onclick="togglePwd()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;">
            <i class="fas fa-eye" id="pwd-icon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-escep btn-escep-primary" style="width:100%;justify-content:center;padding:12px;">
        <i class="fas fa-arrow-right"></i> Se connecter
      </button>
    </form>

    <p style="text-align:center;margin-top:18px;font-size:0.8rem;color:#888;">
      <i class="fas fa-shield-alt" style="color:#1A4F8A;"></i>
      Un code de vérification vous sera envoyé par email
    </p>
  </div>
</div>
<script>
function togglePwd() {
  const input = document.getElementById('id_password');
  const icon = document.getElementById('pwd-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fas fa-eye';
  }
}
</script>
</body>
</html>
